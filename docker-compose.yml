# Kith — standalone Docker Compose.
# Copy .env.example to .env first. Kith serves its SPA + API on one port and
# works behind any reverse proxy, or directly on a trusted network.
#
# Database: a bundled MariaDB ships below under the `bundled-db` compose
# profile, which .env.example enables by default (COMPOSE_PROFILES=bundled-db,
# DB_HOST=db). To use an external MariaDB/MySQL server instead:
#   1. Set COMPOSE_PROFILES= (empty) in .env
#   2. Point DB_HOST/DB_PORT/DB_USER/DB_PASSWORD/DB_NAME at your server
#   3. Set DB_SSL=true (+ DB_SSL_CA, or DB_SSL_INSECURE=true for self-signed)
services:
  kith:
    build: .
    container_name: kith
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        required: false   # ignored when the bundled-db profile is inactive
    ports:
      - "${EXTERNAL_PORT:-8084}:${INTERNAL_PORT:-3000}"
    volumes:
      # Media (photos/videos + thumbnails) and temporary import-upload staging.
      # Point the host paths at any mounted volume you like.
      - ./data/media:/media
      - ./data/uploads:/app/uploads
    networks:
      - kith_network
    security_opt:
      - no-new-privileges:true
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:${INTERNAL_PORT:-3000}/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # --- Optional: reverse proxy ---
    # Kith needs no proxy to run. If you use one (Traefik, Caddy, nginx, etc.),
    # route your host to this container's port. A Traefik example — note the
    # /api path must bypass any SSO forward-auth, since Kith's own JWT is the
    # API auth boundary and SSO 302s would break SPA fetches:
    #
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.kith.rule=Host(`${URL}`)"
    #   - "traefik.http.routers.kith.entrypoints=https"
    #   - "traefik.http.routers.kith.tls=true"
    #   # optional SSO on the UI shell only:
    #   - "traefik.http.routers.kith.middlewares=your-sso-forwardauth@docker"
    #   # API router — exempt from SSO, higher priority:
    #   - "traefik.http.routers.kith-api.rule=Host(`${URL}`) && PathPrefix(`/api`)"
    #   - "traefik.http.routers.kith-api.entrypoints=https"
    #   - "traefik.http.routers.kith-api.tls=true"
    #   - "traefik.http.routers.kith-api.priority=100"
    #   - "traefik.http.routers.kith-api.service=kith"
    #   - "traefik.http.services.kith.loadbalancer.server.port=${INTERNAL_PORT:-3000}"

  # Bundled MariaDB — active only under the `bundled-db` compose profile
  # (the default in .env.example). Not exposed on the host; reachable from
  # the app as DB_HOST=db. Data persists in the kith_db_data named volume.
  db:
    image: mariadb:11.4
    container_name: kith-db
    profiles: [ bundled-db ]
    environment:
      MARIADB_DATABASE: ${DB_NAME:-kith}
      MARIADB_USER: ${DB_USER:-kith}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - kith_db_data:/var/lib/mysql
    networks:
      - kith_network
    security_opt:
      - no-new-privileges:true
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kith_db_data:

networks:
  kith_network:
    driver: bridge
