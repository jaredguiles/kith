version: '3.8'

services:
  kith:
    image: ${IMAGE}:${TAG}
    container_name: kith
    restart: ${RESTART_POLICY}
    ports:
      - "${EXTERNAL_PORT}:${INTERNAL_PORT}"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${INTERNAL_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      MEDIA_PATH: ${MEDIA_PATH}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE}
    volumes:
      - ./uploads:${MEDIA_PATH}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${INTERNAL_PORT}${HEALTHCHECK_ENDPOINT}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kith.rule=Host(\`${URL}\`)"
      - "traefik.http.routers.kith.entrypoints=websecure"
      - "traefik.http.routers.kith.tls.certresolver=letsencrypt"
      - "traefik.http.services.kith.loadbalancer.server.port=${INTERNAL_PORT}"
