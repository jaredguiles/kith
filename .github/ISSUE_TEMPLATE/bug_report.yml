name: Bug report
description: Something isn't working right
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, plus what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kith version
      placeholder: e.g. v1.9.2 (Settings → About, or your image tag)
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose (bundled dev MariaDB)
        - Docker (external MariaDB)
        - Node directly (no Docker)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`docker logs kith` output around the error. Redact secrets."
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS / browser / reverse proxy (if relevant)
