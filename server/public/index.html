<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kith</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-bg" id="appBg"></div>

<!-- Login page (shown when not authenticated) -->
<div class="login-page" id="loginPage" style="display:none;">
  <div class="login-card">
    <div class="login-brand">
      <span class="login-brand-icon">◆</span>
      <span class="login-brand-name">Kith</span>
    </div>
    <form class="login-form" id="loginForm">
      <div class="field-group">
        <label class="field-label">Username or email</label>
        <input class="input" type="text" id="loginUsername" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <div style="position:relative;">
          <input class="input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required style="padding-right:40px;">
          <button type="button" class="btn-icon" onclick="toggleLoginPassword()" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);" title="Show/hide password">
            <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="loginError" style="color:var(--red);font-size:13px;display:none;"></div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:9px 14px;margin-top:4px;">
        Sign in
      </button>
    </form>
    <p class="login-footer">Kith is a private app — access is by invitation only.</p>
  </div>
</div>

<!-- Main app (shown when authenticated) -->
<div class="app" id="mainApp" style="display:none;">
  <!-- Mobile header -->
  <div class="mob-header">
    <button class="btn-icon" id="mobMenuBtn" title="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="mob-header-brand">◆ <span id="mobAppName">Kith</span></span>
    <div class="av av-sm" id="mobUserAvatar" style="cursor:pointer;"></div>
  </div>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <span class="sidebar-brand-icon">◆</span>
        <span class="sidebar-brand-name" id="sidebarAppName">Kith</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="btn-icon btn-flame" id="spicyToggle" title="Toggle spicy mode" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="sidebar-search-input" id="globalSearch" placeholder="Search… ⌘K">
    </div>

    <button class="btn btn-primary sidebar-add-btn" id="addContactBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New person
    </button>

    <nav class="sidebar-nav" id="sidebarNav">
      <a class="nav-item active" data-page="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a class="nav-item" data-page="contacts">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Contacts
      </a>
      <a class="nav-item" data-page="events">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Events
      </a>
      <a class="nav-item" data-page="notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Notifications
        <span class="nav-badge" id="notifBadge" style="display:none;">0</span>
      </a>
      <a class="nav-item" data-page="settings" id="settingsNav" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-section" id="favoritesList">
      <div class="sidebar-section-label">FAVORITES</div>
      <div id="favoritesContent"></div>
    </div>

    <div class="sidebar-section" id="groupsList">
      <div class="sidebar-section-label">GROUPS</div>
      <div id="groupsContent"></div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="av av-sm" id="sidebarUserAvatar"></div>
        <div>
          <div class="sidebar-user-name" id="sidebarUserName">Admin</div>
          <div class="sidebar-user-role" id="sidebarUserRole">Main Admin</div>
        </div>
      </div>
      <button class="btn-icon" id="logoutBtn" title="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="main" id="mainContent">
    <div id="pageContent"></div>
  </main>
</div>

<!-- Command palette -->
<div class="cmd-palette-overlay" id="cmdPalette" style="display:none;">
  <div class="cmd-palette">
    <div class="cmd-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="cmd-input" id="cmdInput" type="text" placeholder="Search contacts, run actions…">
    </div>
    <div class="cmd-list" id="cmdList"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer" style="position:fixed;bottom:24px;right:24px;z-index:10000;display:flex;flex-direction:column;gap:8px;"></div>

<!-- Import progress widget -->
<div class="import-widget" id="importWidget" style="display:none;">
  <div class="import-widget-header">
    <span class="import-widget-title" id="importWidgetTitle">Processing import…</span>
    <button class="btn-icon" onclick="document.getElementById('importWidget').style.display='none'" title="Dismiss">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="import-widget-body">
    <div class="import-widget-progress">
      <div class="import-widget-progress-bar" id="importProgressBar" style="width:0%"></div>
    </div>
    <div class="import-widget-stats" id="importWidgetStats"></div>
    <button class="btn btn-primary btn-sm" id="importReviewBtn" style="display:none;" onclick="window.app.navigate('import-review')">Review now</button>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/components.js"></script>
<script src="/js/pages.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
